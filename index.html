<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Early Project Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { 
        (window.vaq = window.vaq || []).push(arguments); 
      };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Twitter Early Project Finder</h1>
            <p>Live feed of early projects and curated reports</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-target="live-feed">Live Alerts</button>
            <button class="tab-btn" data-target="curated-feed">Curated Report</button>
            <button class="tab-btn" data-target="webhook-section">Discord Webhook</button>
        </div>

        <main id="live-feed" class="message-container">
            <div class="loading">Loading messages...</div>
        </main>

        <main id="curated-feed" class="message-container" style="display: none;">
            <div class="loading">Loading curated report...</div>
        </main>

        <main id="webhook-section" class="message-container" style="display: none;">
            <div class="contact-card">
                <h2>Discord Webhook Access</h2>
                <p>Want to receive live alerts directly to your Discord server?</p>
                <a href="https://x.com/nftprada" target="_blank" class="contact-btn">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
                    Contact @nftprada
                </a>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
