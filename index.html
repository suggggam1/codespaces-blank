<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Early Project Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Vercel Web Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Twitter Early Project Finder</h1>
            <p>Live feed of early projects and curated reports</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-target="live-feed">Live Alerts</button>
            <button class="tab-btn" data-target="curated-feed">Curated Report</button>
            <button class="tab-btn" data-target="webhook-section">Discord Webhook</button>
        </div>

        <main id="live-feed" class="message-container">
            <div class="loading">Loading messages...</div>
        </main>

        <main id="curated-feed" class="message-container" style="display: none;">
            <div class="loading">Loading curated report...</div>
        </main>

        <main id="webhook-section" class="message-container" style="display: none;">
            <div class="contact-card">
                <h2>Discord Webhook Access</h2>
                <p>Want to receive live alerts directly to your Discord server?</p>
                <p>Please contact <a href="https://x.com/nftprada" target="_blank" class="accent-link">@nftprada</a> on Twitter to get Discord webhook access.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
