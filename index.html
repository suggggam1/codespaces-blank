<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Early Project Finder - Paused</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Vercel Web Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        .paused-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
        }
        .paused-message {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-color);
            border-radius: 6px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            margin-top: 50px;
        }
        .paused-message h1 {
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .paused-message p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .paused-message a {
            color: var(--accent-color);
            text-decoration: none;
        }
        .paused-message a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container paused-container">
        <div class="paused-message">
            <h1>Website Temporarily Paused</h1>
            <p>If anyone wants the alert sent to Discord, please contact <a href="https://x.com/nftprada" target="_blank">@NFTprada</a> through Twitter DM.</p>
        </div>
    </div>
